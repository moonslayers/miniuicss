<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniUI CSS - Strategic Minimalist UI</title>
  </head>
  <body>
    <div style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
      <h1 style="margin-bottom: 0.5rem; font-size: 2rem;">MiniUI CSS</h1>
      <p style="margin-bottom: 2rem; color: var(--mui-text-color); opacity: 0.7;">Strategic Minimalist UI - Buttons</p>

      <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Button Variants</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem;">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-info">Info</button>
      </div>

      <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Button Sizes</h2>
      <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 2rem;">
        <button class="btn btn-primary btn-sm">Small</button>
        <button class="btn btn-primary">Default</button>
        <button class="btn btn-primary btn-lg">Large</button>
      </div>

      <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">All Colors - Small</h2>
      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem;">
        <button class="btn btn-sm btn-primary">Primary</button>
        <button class="btn btn-sm btn-secondary">Secondary</button>
        <button class="btn btn-sm btn-success">Success</button>
        <button class="btn btn-sm btn-warning">Warning</button>
        <button class="btn btn-sm btn-danger">Danger</button>
        <button class="btn btn-sm btn-info">Info</button>
      </div>

      <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">All Colors - Large</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem;">
        <button class="btn btn-lg btn-primary">Primary</button>
        <button class="btn btn-lg btn-secondary">Secondary</button>
        <button class="btn btn-lg btn-success">Success</button>
        <button class="btn btn-lg btn-warning">Warning</button>
        <button class="btn btn-lg btn-danger">Danger</button>
        <button class="btn btn-lg btn-info">Info</button>
      </div>

      <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Disabled State</h2>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem;">
        <button class="btn btn-primary" disabled>Primary</button>
        <button class="btn btn-secondary" disabled>Secondary</button>
        <button class="btn btn-success" disabled>Success</button>
        <button class="btn btn-warning" disabled>Warning</button>
        <button class="btn btn-danger" disabled>Danger</button>
        <button class="btn btn-info" disabled>Info</button>
      </div>

      <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #e5e7eb;">
        <button id="themeToggle" class="btn btn-secondary" onclick="toggleTheme()">Toggle Dark Mode</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
      function toggleTheme() {
        const html = document.documentElement
        const currentTheme = html.getAttribute('data-theme')
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark'
        html.setAttribute('data-theme', newTheme)
      }
    </script>
  </body>
</html>
